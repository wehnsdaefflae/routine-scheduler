<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>rsched · ops console</title>
<link rel="stylesheet" href="/static/base.css">
<link rel="stylesheet" href="/static/views.css">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><circle cx='50' cy='50' r='34' fill='none' stroke='%23ffb454' stroke-width='8'/><circle cx='50' cy='16' r='9' fill='%23ffb454'/></svg>">
</head>
<body>
<header class="topbar">
  <a class="brand" href="#/">
    <svg class="brand-mark" viewBox="0 0 100 100" aria-hidden="true">
      <circle cx="50" cy="50" r="34" fill="none" stroke="currentColor" stroke-width="8"/>
      <circle cx="50" cy="16" r="9" fill="currentColor"/>
      <line x1="50" y1="50" x2="72" y2="34" stroke="currentColor" stroke-width="6" stroke-linecap="round"/>
    </svg>
    <span class="brand-name">rsched</span>
    <span class="brand-sub">ops console</span>
    <span class="brand-ver" id="app-version" title="release · commit of the running checkout"></span>
  </a>
  <nav id="nav">
    <a href="#/questions" data-nav="questions">Decisions <span id="q-badge" class="badge" hidden></span></a>
    <a href="#/" data-nav="dashboard">Routines</a>
    <a href="#/conversations" data-nav="conversations">Conversations</a>
    <a href="#/library" data-nav="library">Library</a>
    <a href="#/settings" data-nav="settings">Settings</a>
    <a href="#/log" data-nav="log">Log</a>
    <a href="#/audit" data-nav="audit">Audit</a>
    <a href="#/stats" data-nav="stats">Stats</a>
    <a href="#/help" data-nav="help">Help</a>
  </nav>
  <div class="topbar-right">
    <a class="btn primary small" id="nav-new-routine" href="#/wizard">+ new routine</a>
    <span class="clock" id="clock" aria-label="local time"></span>
    <span id="daemon-dot" class="lamp" title="daemon link"></span>
  </div>
</header>
<!-- First-launch notice: the seeded self-improvement routines ship disabled (no hidden costs);
     populated by app.js from /api/status.meta_routines, dismissible via localStorage. -->
<div id="meta-banner" class="notice-banner" hidden></div>
<!-- In-flight new-routine setup: a persistent, always-visible way back to the live wizard,
     shown on every view while a session exists (populated by app.js from /api/wizard). -->
<div id="setup-banner" class="setup-banner" hidden></div>
<!-- Location indicator: where you are in the console, reflecting the deep path in the URL. -->
<nav id="crumbs" class="crumbs" aria-label="breadcrumb"></nav>
<main id="view"></main>
<div id="toast" hidden></div>
<script type="module" src="/static/app.js"></script>
</body>
</html>
