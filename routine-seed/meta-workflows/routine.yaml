name: 'Meta: workflow library'
description: Reviews all routines' transcripts and ledgers, then fixes and improves
  the shared workflow library.
tags:
- meta
- maintenance
- workflows
slug: meta-workflows
enabled: false
schedule:
  cron: 0 8 * * 1
  tz: Europe/Berlin
  catchup: skip
workflow:
  library_slug: meta-workflows
  library_commit: eab87b5
permissions:
- util-authoring
- self-modification
budgets:
  max_turns: 60
  max_wall_clock_min: 45
  max_total_tokens: 1500000
  max_subruns: 8
  max_subrun_depth: 2
  ask_timeout_h: 8
retention:
  keep_runs: 30
fs_read_roots:
- ~/routines
- ~/.local/share/routine-scheduler-libraries
fs_write_roots:
- ~/.local/share/routine-scheduler-libraries
