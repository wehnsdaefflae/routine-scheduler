name: Library sync
description: Publishes the whole instance to the library repo — stages routines and sanitized config into the repo tree, then commits/pulls/pushes workflows, fragments, utils, routines, and config to the remote.
tags:
- meta
- maintenance
- sync
slug: library-sync
enabled: false
schedule:
  cron: 0 */6 * * *
  tz: Europe/Berlin
  catchup: skip
workflow:
  library_slug: library-sync
  library_commit: 2ef9bfb
fragments:
- global-utils
- util-authoring
- ledger-discipline
budgets:
  max_turns: 60
  max_wall_clock_min: 45
  max_total_tokens: 1500000
  max_subruns: 8
  max_subrun_depth: 2
  ask_timeout_h: 8
retention:
  keep_runs: 30
