name: Self audit
description: Weekly review of the routine-scheduler code and routines — files fixes
  directly and larger changes as proposals.
tags:
- meta
- maintenance
- code
slug: self-audit
enabled: false
schedule:
  cron: 0 6 * * 1
  tz: Europe/Berlin
  catchup: skip
workflow:
  library_slug: self-audit-code
  library_commit: d18b822
permissions:
- communication
- util-authoring-autonomous
budgets:
  max_turns: 60
  max_wall_clock_min: 45
  max_total_tokens: -1
  max_subruns: 8
  max_subrun_depth: 2
  ask_timeout_h: 8
retention:
  keep_runs: 30
fs_read_roots:
- ~/git-repos/routine-scheduler
- ~/routines
fs_write_roots:
- ~/git-repos/routine-scheduler
- ~/routines/.control
