name: Routine clarification
description: Template for "+ New routine" clarification sessions — every session copies
  its budgets, models, and traits from here. Protected — never scheduled, never archived,
  never run directly.
tags:
- meta
- template
slug: clarification
enabled: false
schedule:
  cron: ''
  tz: Europe/Berlin
  catchup: skip
workflow:
  library_slug: clarify-instruction
  library_commit: ''
permissions: []
capabilities:
  actions: []
  utils: []
