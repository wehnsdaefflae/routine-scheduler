# rsched — daemon + web UI in one container, everything mutable bind-mounted.
#
# The CONTAINER paths are always /home/mark/... (routines and config bake absolute paths, so they
# must not change). The HOST paths are ${RSCHED_HOME}-relative (default /home/mark), so on the
# server you can unpack the migration bundle anywhere and just set RSCHED_HOME to its base.
#
#   RSCHED_HOME=/home/mark          docker compose up -d      # bundle unpacked into /home/mark
#   RSCHED_HOME=/srv/rsched-data    docker compose up -d      # …or anywhere else

services:
  rsched:
    build:
      context: .
      args:
        UID: "${RSCHED_UID:-1000}"
        GID: "${RSCHED_GID:-1000}"
    image: rsched:latest
    container_name: rsched
    restart: unless-stopped          # self-audit's drain-and-exit restart relaunches here, like Restart=always
    stop_grace_period: 20s           # matches the old systemd TimeoutStopSec (uvicorn bounds its own to 10s)
    ports:
      - "${RSCHED_PORT:-8321}:8321"  # reachable at http://192.168.0.128:8321
    environment:
      HOME: /home/mark
      RSCHED_BIND: "0.0.0.0"         # bind the LAN inside the container without editing the mounted config
      # The claude-cli transport reads its token from the mounted ~/.credentials/claude-code-oauth.env.
      # If you'd rather inject it (e.g. it lives elsewhere on the server), uncomment:
      # CLAUDE_CODE_OAUTH_TOKEN: "${CLAUDE_CODE_OAUTH_TOKEN}"
    volumes:
      - ${RSCHED_HOME:-/home/mark}/git-repos/routine-scheduler:/home/mark/git-repos/routine-scheduler
      - ${RSCHED_HOME:-/home/mark}/.config/routine-scheduler:/home/mark/.config/routine-scheduler
      - ${RSCHED_HOME:-/home/mark}/.config/gh:/home/mark/.config/gh          # `gh auth login` persists here
      - ${RSCHED_HOME:-/home/mark}/.credentials:/home/mark/.credentials:ro    # optional file-based secrets (read-only)
      - ${RSCHED_HOME:-/home/mark}/routines:/home/mark/routines
      # Conversations + detached background runs are data, exactly like routines — without
      # these binds they land in the container's writable layer and DIE on every recreate.
      - ${RSCHED_HOME:-/home/mark}/conversations:/home/mark/conversations
      - ${RSCHED_HOME:-/home/mark}/background:/home/mark/background
      # The host's timezone, read-only: local times in logs/cron, and server_tz() reads
      # /etc/timezone (the /etc/localtime symlink trick doesn't survive a bind mount).
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro
      # One merged library repo (workflows/ + fragments/ + utils/ + gu) — see config `libraries_home`.
      - ${RSCHED_HOME:-/home/mark}/.local/share/routine-scheduler-libraries:/home/mark/.local/share/routine-scheduler-libraries
      # Playwright's browser cache: page-fetch downloads Chromium here once (user-level);
      # mounted so the ~170 MB download survives container recreation. Libs live in the image.
      - ${RSCHED_HOME:-/home/mark}/.cache/ms-playwright:/home/mark/.cache/ms-playwright
