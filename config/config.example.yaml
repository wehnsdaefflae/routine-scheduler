# routine-scheduler server config — copy to ~/.config/routine-scheduler/config.yaml
# (deploy/install.sh writes one with a generated token if none exists)

bind: 127.0.0.1        # 0.0.0.0 to expose on the LAN
port: 8321
token: "change-me"     # bearer token for the web UI / API (install.sh generates one)

routines_home: ~/routines
library_home: ~/.local/share/workflow-library

max_concurrent_runs: 2
registry_rescan_s: 30

# Chat-completion endpoints. kind: openai | anthropic | claude-cli
#   context_chars — compaction threshold input (chars ≈ tokens*4)
#   schema_mode (openai kind) — json_schema | json_object | none
endpoints:
  claude-cli:
    kind: claude-cli
    credentials_env: ~/.credentials/claude-code-oauth.env
    context_chars: 400000
  anthropic:
    kind: anthropic
    base_url: https://api.anthropic.com
    key_env_file: ~/.credentials/anthropic.env
    key_var: ANTHROPIC_API_KEY
    context_chars: 400000
  ollama-local:
    kind: openai
    base_url: "http://127.0.0.1:11434/v1"
    api_key: "ollama"
    schema_mode: json_schema
    context_chars: 36000
    temperature: 0.2

# Model roles routines refer to (each routine.yaml may override).
default_roles:
  orchestrator: {endpoint: claude-cli, model: opus, effort: medium}
  subcall:      {endpoint: claude-cli, model: sonnet}
  cheap:        {endpoint: ollama-local, model: "gemma4:latest"}
