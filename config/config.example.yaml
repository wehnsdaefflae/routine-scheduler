# routine-scheduler server config — copy to ~/.config/routine-scheduler/config.yaml
# (deploy/install.sh writes one with a generated token if none exists)

bind: 127.0.0.1        # 0.0.0.0 to expose on the LAN
port: 8321
token: "change-me"     # bearer token for the web UI / API (install.sh generates one)

routines_home: ~/routines

# Workflow library (control-flow patterns). Set library_remote to clone-from / sync-to a repo.
library_home: ~/.local/share/workflow-library
library_remote: ""     # e.g. https://github.com/<you>/routine-workflow-library.git

# Global-util library — the ONLY way routines run code (there is no shell). Starts empty-
# capable; routines generate utils on demand. Set utils_remote to bootstrap from / sync to a repo.
utils_home: ~/.local/share/routine-utils
utils_remote: ""       # e.g. https://github.com/<you>/routine-utils.git
confirm_util_changes: true   # ask the user to approve before a util is created/revised (req 7)

max_concurrent_runs: 2
registry_rescan_s: 30

# Chat-completion endpoints — model TRANSPORTS only; this scheduler's engine is the one
# and only harness. kind: openai | anthropic | claude-cli
#   claude-cli = Claude Code CLI in fully stripped print mode (tools off, no settings/MCP/
#   session, OUR system prompt replaces its own) — a subscription-billed completion
#   function, never an agent loop.
#   context_chars — compaction threshold (chars; ~4 chars ≈ 1 token)
#   schema_mode (openai kind) — json_schema | json_object | none
# API keys live in ~/.credentials/*.env files (VAR=value lines), never in this file.
endpoints:
  openrouter:
    kind: openai
    base_url: "https://openrouter.ai/api/v1"
    key_env_file: ~/.credentials/open_router.env  # line: OPENROUTER_KEY=sk-or-v1-...
    key_var: OPENROUTER_KEY
    schema_mode: json_object   # provider json_schema grammars mangle optional fields (empty-pad, drop content)
    context_chars: 400000
  ollama-local:
    kind: openai
    base_url: "http://127.0.0.1:11434/v1"
    api_key: "ollama"                             # Ollama ignores the key; no file needed
    schema_mode: json_object   # grammar mode pads other kinds' fields into actions (like openrouter)
    context_chars: 36000
    temperature: 0.2
  anthropic:
    kind: anthropic                               # direct Messages API (metered billing)
    base_url: https://api.anthropic.com
    key_env_file: ~/.credentials/anthropic.env    # line: ANTHROPIC_KEY=sk-ant-...
    key_var: ANTHROPIC_KEY
    context_chars: 400000
  claude-cli:
    kind: claude-cli                              # subscription-billed transport (see above)
    credentials_env: ~/.credentials/claude-code-oauth.env   # minted by `gu claude-login`
    context_chars: 400000                         # models: opus | sonnet | haiku | full names

# Model roles routines refer to (each routine.yaml may override). Claude models are
# reachable via `claude-cli` (subscription), `anthropic` (metered), or openrouter
# "anthropic/..." models (metered).
default_roles:
  orchestrator: {endpoint: openrouter, model: "z-ai/glm-5.2", effort: low}
  subcall:      {endpoint: openrouter, model: "z-ai/glm-5.2", effort: low}
  cheap:        {endpoint: ollama-local, model: "gemma4:latest"}
