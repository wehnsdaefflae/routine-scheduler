# routine-scheduler server config — copy to ~/.config/routine-scheduler/config.yaml
# (deploy/install.sh writes one with a generated token if none exists)

bind: 127.0.0.1        # 0.0.0.0 to expose on the LAN
port: 8321
token: "change-me"     # bearer token for the web UI / API (install.sh generates one)

routines_home: ~/routines

# Workflow library (control-flow patterns). Set library_remote to clone-from / sync-to a repo.
library_home: ~/.local/share/workflow-library
library_remote: ""     # e.g. https://github.com/<you>/routine-workflow-library.git

# Fragment library (reusable routine standards: self-management, tool use). Toggled per routine.
fragments_home: ~/.local/share/routine-fragments
fragments_remote: ""   # e.g. https://github.com/<you>/routine-fragments-lib.git

# Global-util library — the ONLY way routines run code (there is no shell). Starts empty-
# capable; routines generate utils on demand. Set utils_remote to bootstrap from / sync to a repo.
utils_home: ~/.local/share/global-utils
utils_remote: ""       # e.g. https://github.com/<you>/routine-utils.git
confirm_util_changes: true   # ask the user to approve before a util is created/revised (req 7)

max_concurrent_runs: 2
registry_rescan_s: 30

# Chat-completion endpoints — model TRANSPORTS only; this scheduler's engine is the one and only
# harness. NONE are configured by default: add the ones you use in the web UI (Settings → LLM
# endpoints), which explains what credential each kind needs. kind: openai | anthropic | claude-cli
#   openai     — any OpenAI-compatible API (OpenRouter, vLLM, …). Needs an API key.
#   anthropic  — Anthropic's Messages API, METERED per-token billing. Needs an sk-ant-… API key.
#   claude-cli — your Claude Max/Pro SUBSCRIPTION (no per-token billing). Uses the
#                CLAUDE_CODE_OAUTH_TOKEN from Secrets (mint it with `claude setup-token`).
# Once you add endpoints, set the model roles (orchestrator / subcall / cheap) in the same page.
#
# endpoints: {}          # populated from the UI
# default_roles: {}      # set from the UI once endpoints exist
